server.port=8080

# CORS (frontend usually runs on Vite dev server)
app.cors.allowedOrigin=http://localhost:5173

# Stockfish engine
stockfish.path=src/main/resources/stockfish/stockfish.exe
stockfish.depth=15
stockfish.timeoutMs=8000

# Database
# If DB_URL is not set, defaults to an in-memory H2 database.
spring.datasource.url=${DB_URL:jdbc:h2:mem:chess_analyzer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Enable H2 console for development
spring.h2.console.enabled=true

